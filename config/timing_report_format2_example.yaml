# Timing 报告生成配置示例（format2 风格）
# 用法: python -m lib gen-report config/timing_report_format2_example.yaml -o output/gen.rpt
# startpoint、endpoint 与路径上每个 point 均由 point_generator 生成，形成完整 timing 路径

format: format2
num_paths: 2

# 路径级变量（clock、prefix 等）；startpoint/endpoint 由 point_generator 从 launch 段首/末 pin 自动得到
path_vars:
  clock:
    type: fixed
    value: "pll_cpu_clk"
  prefix:
    type: format
    template: "x_top/path_{path_id}"

# 路径点生成器：为每条 path 的 launch/capture 每一行生成 point 名，并据此得到 startpoint、endpoint
point_generator:
  clock:
    template: "{clock} (rise edge)"
  port:
    template: "dft_clk (in)"
  net:
    template: "{prefix}/net_{net_index}"
  pin:
    # 第一个 pin = startpoint (Q)，最后一个 pin = endpoint (D)，中间为组合逻辑 (Z)
    # pin_index 在 launch/capture 段内均为当前 pin 序号
    template: "{prefix}/u{pin_index}/{pin_suffix} (CELL)"
  arrival:
    template: "data arrival time"
  required:
    template: "data required time"
  slack:
    template: "slack (VIOLATED)"
  default:
    template: ""

# Part 1: 每条 path 的 Title
title:
  attributes:
    - name: Scenario
      value:
        type: fixed
        value: "func_WorstLT_cworst_CCworst_T"
    - name: Path Start
      value:
        type: format
        template: "{startpoint} ( flip-flop, falling edge-triggered,  {clock})"
    - name: Path End
      value:
        type: format
        template: "{endpoint} ( flip-flop, falling edge-triggered,  {clock})"
    - name: Common Pin
      value:
        type: ref
        ref: clock
    - name: Group Name
      value:
        type: enum
        choices: [REG2REG, REG2CGP]
    - name: Analysis Type
      value:
        type: enum
        choices: [min, max]

# Part 2: Timing path 表格（列顺序与各列取值配置）
path_table:
  column_order:
    - Type
    - Fanout
    - Cap
    - D-Trans
    - Trans
    - Derate
    - x-coord
    - y-coord
    - D-Delay
    - Delay
    - Time
    - Description
  columns:
    Type:
      value: { type: row_type }
    Fanout:
      value: { type: random_int, min: 1, max: 4 }
      when_type: [net]
    Cap:
      value: { type: random_float, min: 0.001, max: 0.01, decimals: 3 }
      when_type: [net]
    "D-Trans":
      value: { type: fixed, value: "-0.000" }
      when_type: [input_pin, pin]
    Trans:
      value: { type: random_float, min: 0.01, max: 0.02, decimals: 3 }
      when_type: [output_pin, pin]
    Derate:
      value: { type: fixed, value: "0.900,0.900" }
      when_type: [pin, input_pin, output_pin]
    "x-coord":
      value: { type: random_float, min: 200, max: 600, decimals: 2 }
      when_type: [pin, input_pin, output_pin]
    "y-coord":
      value: { type: random_float, min: 700, max: 1000, decimals: 2 }
      when_type: [pin, input_pin, output_pin]
    "D-Delay":
      value: { type: fixed, value: "-0.000" }
      when_type: [pin, input_pin, output_pin]
    Delay:
      value: { type: random_float, min: 0.01, max: 0.06, decimals: 3 }
      when_type: [pin, clock, output_pin, input_pin]
    Time:
      value: { type: random_float, min: 0.03, max: 0.10, decimals: 3 }
      when_type: [pin, clock, output_pin, input_pin]
    Description:
      value:
        type: format
        template: " /     {point}"
      when_type: [pin, input_pin, output_pin]
  row_templates:
    - type: clock
      count: 2
    - type: port
      count: 1
    - type: net
      count: 1
    - type: pin
      count: 4
    - type: net
      count: 1
    - type: pin
      count: 2
    - type: arrival
      count: 1
  capture_row_templates:
    - type: clock
      count: 2
    - type: pin
      count: 2
    - type: required
      count: 1
    - type: slack
      count: 1
  separator: "-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-"
  slack_line: false
  # format2：Time = cumsum(Delay)，由生成器自动应用
  cumulative_rules: { Time: Delay }
