# format2 生成配置（与 input/format_2.timing_report.raw.rpt.txt 结构对齐）
# 用法：
#   python -m lib gen-report config/gen_report/format2.yaml --seed 1
format: format2
num_paths: 2

path_vars:
  clock: { type: fixed, value: "pll_cpu_clk" }
  prefix: { type: format, template: "x_top/path_{path_id}" }

# 生成完整 timing 路径（startpoint/endpoint 自动取 launch 段首/末 pin）
point_generator:
  clock: { template: "{clock} (rise edge)" }
  port: { template: "dft_clk (in)" }
  net: { template: "{prefix}/net_{net_index}" }
  pin: { template: "{prefix}/u{pin_index}/{pin_suffix} (CELL)" } # Q / Z / D
  arrival: { template: "data arrival time" }
  required: { template: "data required time" }
  slack: { template: "slack (VIOLATED)" }
  default: { template: "" }

title:
  attributes:
    - { name: Scenario, value: { type: fixed, value: "func_WorstLT_cworst_CCworst_T" } }
    - { name: Path Start, value: { type: format, template: "{startpoint} ( flip-flop, falling edge-triggered,  CPU_CLK)" } }
    - { name: Path End, value: { type: format, template: "{endpoint} ( flip-flop, falling edge-triggered,  CPU_CLK)" } }
    - { name: Common Pin, value: { type: ref, ref: clock } }
    - { name: Group Name, value: { type: enum, choices: [REG2REG, REG2CGP] } }
    - { name: Analysis Type, value: { type: enum, choices: [min, max] } }

path_table:
  column_order: [Type, Fanout, Cap, D-Trans, Trans, Derate, x-coord, y-coord, D-Delay, Delay, Time, Description]
  columns:
    Type: { value: { type: row_type } }
    Fanout: { value: { type: random_int, min: 1, max: 4 }, when_type: [net] }
    Cap: { value: { type: random_float, min: 0.001, max: 0.01, decimals: 3 }, when_type: [net] }
    "D-Trans": { value: { type: fixed, value: "-0.000" }, when_type: [pin, input_pin, output_pin] }
    Trans: { value: { type: random_float, min: 0.000, max: 0.020, decimals: 3 }, when_type: [pin, input_pin, output_pin, port] }
    Derate: { value: { type: fixed, value: "0.900,0.900" }, when_type: [pin, input_pin, output_pin] }
    "x-coord": { value: { type: random_float, min: 200, max: 600, decimals: 3 }, when_type: [pin, input_pin, output_pin, port] }
    "y-coord": { value: { type: random_float, min: 700, max: 1000, decimals: 3 }, when_type: [pin, input_pin, output_pin, port] }
    "D-Delay": { value: { type: fixed, value: "-0.000" }, when_type: [pin, input_pin, output_pin] }
    Delay: { value: { type: random_float, min: 0.000, max: 0.060, decimals: 3 }, when_type: [clock, pin, input_pin, output_pin, constraint] }
    Time: { value: { type: fixed, value: "" } } # 由 cumulative_rules 自动填充
    Description:
      value: { type: format, template: " /     {point}" }
      when_type: [pin, input_pin, output_pin, port, clock, net, constraint, required, arrival, slack]
  # format2：Time = cumsum(Delay)
  cumulative_rules: { Time: Delay }
  row_templates:
    - { type: clock, count: 2 }
    - { type: port, count: 1 }
    - { type: net, count: 1 }
    - { type: pin, count: 6 }
    - { type: arrival, count: 1 }
  capture_row_templates:
    - { type: clock, count: 2 }
    - { type: constraint, count: 1 }
    - { type: required, count: 1 }
    - { type: arrival, count: 1 }
    - { type: slack, count: 1 }
  separator: "-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-"
  slack_line: false

